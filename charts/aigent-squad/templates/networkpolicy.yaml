{{- /*
NetworkPolicy (spec 05): specialist services accept ingress ONLY from the
supervisor; exposed services (supervisor, mcp-server) also accept ingress from
the ingress controller namespace. Opt-in via networkPolicy.enabled.
*/ -}}
{{- if .Values.networkPolicy.enabled }}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $ctx := dict "root" $root "name" $name }}
{{- $expose := dig "expose" false $svc }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aigent-squad.serviceFullname" $ctx }}
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aigent-squad.selectorLabels" $ctx | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if and $expose $root.Values.networkPolicy.ingressNamespaceSelector }}
        # External traffic via the ingress controller namespace.
        - namespaceSelector:
            matchLabels:
              {{- toYaml $root.Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
        {{- end }}
        {{- /* Per-service allowFrom is the source of truth for in-cluster peers.
               Two-tier (spec 31): the supervisor allows only the gateway; the
               gateway allows the ingress controller (above) + any callers added
               in its allowFrom (Alertmanager, anomaly-detection, Falco …). */}}
        {{- range (dig "networkPolicy" "allowFrom" list $svc) }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $svc.port }}
{{- end }}
{{- end }}
{{- end }}
