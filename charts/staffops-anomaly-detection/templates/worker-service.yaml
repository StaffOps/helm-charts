apiVersion: v1
kind: Service
metadata:
  name: {{ include "staffops-ad.worker.fullname" . }}
  labels:
    {{- include "staffops-ad.worker.labels" . | nindent 4 }}
spec:
  # Headless service: clusterIP=None makes DNS resolve to individual pod IPs.
  # The controller uses dns:/// scheme with grpc round_robin balancer to
  # distribute jobs across all worker pods. A normal ClusterIP would resolve
  # to a single VIP and break round-robin.
  type: {{ .Values.worker.service.type | default "ClusterIP" }}
  clusterIP: {{ .Values.worker.service.clusterIP | default "None" }}
  publishNotReadyAddresses: false
  ports:
    - name: grpc
      port: {{ .Values.worker.grpcPort }}
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "staffops-ad.worker.selectorLabels" . | nindent 4 }}
