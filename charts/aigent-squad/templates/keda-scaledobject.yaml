{{- /*
KEDA ScaledObject per service (k8s-best-practices: KEDA over raw HPA).
Requires the KEDA CRDs in the cluster — opt-in via services.<name>.scaling.keda.enabled.
*/ -}}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (dig "scaling" "keda" "enabled" false $svc) }}
{{- $ctx := dict "root" $root "name" $name }}
{{- $fullname := include "aigent-squad.serviceFullname" $ctx }}
{{- $keda := dig "scaling" "keda" dict $svc }}
{{- $rolloutEnabled := dig "rollout" "enabled" false $svc }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
spec:
  scaleTargetRef:
    {{- if $rolloutEnabled }}
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    {{- else }}
    apiVersion: apps/v1
    kind: Deployment
    {{- end }}
    name: {{ $fullname }}
  minReplicaCount: {{ dig "minReplicas" 1 $keda }}
  maxReplicaCount: {{ dig "maxReplicas" 5 $keda }}
  triggers:
    {{- $triggers := dig "triggers" list $keda }}
    {{- if $triggers }}
    {{- toYaml $triggers | nindent 4 }}
    {{- else }}
    # Default CPU trigger when none specified.
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    {{- end }}
{{- end }}
{{- end }}
