{{- if .Values.serviceMonitor.enabled -}}
{{/*
ServiceMonitor for Prometheus Operator. Scrapes /metrics from controller,
worker, and (if enabled) ML services. Each component exposes Prometheus
metrics on its own port.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "staffops-ad.fullname" . }}
  labels:
    {{- include "staffops-ad.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "staffops-ad.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      path: /metrics
      # Metrics carry their own `namespace` label (the monitored workload's
      # namespace, e.g. from AnomalyByWorkload) — without honorLabels, the
      # scrape target's own namespace (wherever this pod runs) overwrites it,
      # renaming the real value to `exported_namespace` and collapsing every
      # series to a single namespace. honorLabels lets the metric's label win.
      honorLabels: true
{{- end }}
