  anomaly-detection:
  - annotations:
      artifacthub.io/category: monitoring-logging
      artifacthub.io/changes: |
        - kind: fixed
          description: redis volumeClaimTemplates now uses selector-only labels — the previous full label set (app.kubernetes.io/version, helm.sh/chart) is immutable-field-breaking on every chart version bump, causing `helm upgrade` to fail with a StatefulSet "Forbidden" error
        - kind: removed
          description: vmServiceScrape — vm-operator honors the standard ServiceMonitor CRD directly; serviceMonitor.enabled is now the single scrape toggle
        - kind: changed
          description: appVersion bumped to 0.9.0 (controller/worker metrics moved to the OTel Metrics API, staffops-otel-libs/go 0.2.0; app no longer emits a cluster label — scrape-layer only)
        - kind: added
          description: suppression.excludeAdaptiveWorkloads — silence adaptive noise from bursty infra workloads
        - kind: changed
          description: appVersion bumped to 0.8.0 (first homolog deploy + per-workload adaptive suppression)
      artifacthub.io/license: Apache-2.0
    apiVersion: v2
    appVersion: 0.9.0
    created: "2026-07-16T17:00:25.265481703Z"
    description: 'Distributed anomaly detection for Kubernetes clusters. Combines
      adaptive statistical detection (Go controller + workers) with ML-based forecasting
      and multivariate analysis (Python). Consumes metrics from any Prometheus-compatible
      TSDB (Prometheus, Thanos, Cortex, VictoriaMetrics, ...) and logs from Loki,
      fires correlated alerts via Alertmanager. '
    digest: 125028bca52976ebe45420c3f4e05e2bfef1dcb0e4f194568befa12545bcd086
    home: https://staffops.github.io/anomaly-detection/
    icon: https://avatars.githubusercontent.com/u/66139348?s=200&v=4
