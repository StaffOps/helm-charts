{{- if eq .Values.agentsSource.type "configmap" }}
{{- $root := . }}
{{- range .Values.agents }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-agent-%s" (include "aigent-squad.fullname" $root) .name }}
  labels:
    {{- include "aigent-squad.labels" $root | nindent 4 }}
    app.kubernetes.io/component: agent-config
data:
  agent.yaml: |
    {{- .config | nindent 4 }}
  prompt.md: |
    {{- .prompt | nindent 4 }}
{{- end }}
{{- end }}
