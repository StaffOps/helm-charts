apiVersion: v2
name: anomaly-detection
description: |
  Distributed anomaly detection for Kubernetes clusters. Combines adaptive
  statistical detection (Go controller + workers) with ML-based forecasting
  and multivariate analysis (Python). Consumes metrics from any
  Prometheus-compatible TSDB (Prometheus, Thanos, Cortex, VictoriaMetrics, ...)
  and logs from Loki, fires correlated alerts via Alertmanager.

type: application

# Chart version follows the chart's own SemVer (independent of appVersion).
# Bump on every chart change. Keep MAJOR/MINOR aligned with breaking values.yaml changes.
version: 0.3.1

# appVersion tracks the upstream anomaly-detection controller release.
# Bump when the default container image tag changes.
appVersion: "0.9.0"

kubeVersion: ">=1.24.0-0"

home: https://staffops.github.io/anomaly-detection/
sources:
  - https://github.com/StaffOps/staffops-anomaly-detection
  - https://github.com/StaffOps/helm-charts

icon: https://avatars.githubusercontent.com/u/66139348?s=200&v=4

keywords:
  - anomaly-detection
  - observability
  - sre
  - prometheus
  - loki
  - alertmanager
  - machine-learning

maintainers:
  - name: StaffOps Contributors
    url: https://github.com/StaffOps

annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: fixed
      description: redis volumeClaimTemplates now uses selector-only labels — the previous full label set (app.kubernetes.io/version, helm.sh/chart) is immutable-field-breaking on every chart version bump, causing `helm upgrade` to fail with a StatefulSet "Forbidden" error
    - kind: removed
      description: vmServiceScrape — vm-operator honors the standard ServiceMonitor CRD directly; serviceMonitor.enabled is now the single scrape toggle
    - kind: changed
      description: appVersion bumped to 0.9.0 (controller/worker metrics moved to the OTel Metrics API, staffops-otel-libs/go 0.2.0; app no longer emits a cluster label — scrape-layer only)
    - kind: added
      description: suppression.excludeAdaptiveWorkloads — silence adaptive noise from bursty infra workloads
    - kind: changed
      description: appVersion bumped to 0.8.0 (first homolog deploy + per-workload adaptive suppression)
