{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (dig "serviceAccount" "create" true $svc) }}
{{- $ctx := dict "root" $root "name" $name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aigent-squad.serviceAccountName" (dict "root" $root "name" $name "svc" $svc) }}
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
  {{- with dig "serviceAccount" "annotations" dict $svc }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
