{{- /*
Optional in-cluster Redis for DEV only (single pod, no HA, no persistence).
Production uses managed ElastiCache (redis.host). Opt-in via redis.inCluster.enabled.
*/ -}}
{{- if .Values.redis.inCluster.enabled }}
{{- $name := printf "%s-redis" (include "aigent-squad.fullname" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "aigent-squad.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: {{ .Values.redis.inCluster.image | quote }}
          # Ephemeral cache (no HA, no persistence). Disable RDB/AOF so a
          # read-only rootfs doesn't trip `stop-writes-on-bgsave-error`
          # (Redis refuses writes when it can't snapshot). Production uses
          # managed ElastiCache instead (redis.host).
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.inCluster.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "aigent-squad.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: redis
{{- end }}
