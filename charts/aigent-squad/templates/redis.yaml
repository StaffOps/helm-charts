{{- /*
Optional in-cluster Redis for DEV/bring-up. StatefulSet + PVC so the cache and
the rate/budget counters SURVIVE a pod restart (spot-instance interruptions
reschedule the pod frequently). Persistence (AOF) is on because /data is a
writable PVC (not the read-only rootfs). Single replica, no HA.

Caveat: an EBS PVC is AZ-locked — a same-AZ restart keeps the data; a cross-AZ
reschedule leaves the PVC Pending until an AZ with the volume is available. For
cross-AZ HA use managed ElastiCache (redis.host / the elasticache TF module).
Opt-in via redis.inCluster.enabled.
*/ -}}
{{- if .Values.redis.inCluster.enabled }}
{{- $name := printf "%s-redis" (include "aigent-squad.fullname" .) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "aigent-squad.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: {{ .Values.redis.inCluster.image | quote }}
          # Persist to the PVC so cache + rate/budget counters survive restarts
          # (AOF every second). /data is a writable PVC, so this is safe under a
          # read-only rootfs (unlike the old emptyDir, which forced --save "").
          args: ["--appendonly", "yes", "--appendfsync", "everysec"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.inCluster.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.redis.inCluster.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.inCluster.persistence.size | default "1Gi" | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "aigent-squad.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: redis
{{- end }}
