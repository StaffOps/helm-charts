## Distributed topology overlay (spec 05): supervisor + 5 specialist agents +
## mcp-server, each its own Deployment/Service/ServiceAccount, autoscaled (KEDA here;
## set autoscaling.kind: hpa for plain HPA), NetworkPolicy-isolated, secrets via ExternalSecret.
##
##   helm template r charts/aigent-squad -f charts/aigent-squad/values-distributed.yaml
##
## This is a STARTING POINT — set real IRSA role ARNs, ingress host, ElastiCache
## endpoint and SecretStore before applying to a cluster (prefer values-<env>.yaml).

topology: distributed

# Specialist services do not run the supervisor's in-process agents.
# Each runs a single agent image; mountAgents loads its own config.
#
# Two-tier front door (spec 31): gateway (public) → supervisor (backend) →
# specialists. NetworkPolicy chain: gateway ⇐ ingress + allowFrom; supervisor
# ⇐ gateway only; each specialist/mcp ⇐ supervisor only.
services:
  # Edge gateway — the ONLY externally exposed tier (spec 31).
  gateway:
    enabled: true
    image: { repository: aigent-squad/supervisor, tag: "0.1.0" }
    command: ["python", "-m", "src.gateway.main"]
    port: 8000
    mountAgents: false
    expose: true
    serviceAccount: { create: true, annotations: {} }
    env:
      SUPERVISOR_URL: "http://{{ .Release.Name }}-supervisor:8001"
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 2, maxReplicas: 10 }
    networkPolicy:
      enabled: true
      # In-cluster callers (Alertmanager, anomaly-detection, Falco …) go here.
      allowFrom: []

  supervisor:
    enabled: true
    image: { repository: aigent-squad/supervisor, tag: "0.1.0" }
    command: ["python", "-m", "src.supervisor.server"]
    port: 8001
    mountAgents: false      # routes to specialists over HTTP instead
    expose: false           # backend only — reached via the gateway
    serviceAccount:
      create: true
      annotations: {}
        # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/aigent-squad-supervisor
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits: { memory: 1Gi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 2, maxReplicas: 10 }
    networkPolicy:
      enabled: true
      # /internal/* trust boundary — only the gateway may reach the supervisor.
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: gateway } }

  aws:
    enabled: true
    image: { repository: aigent-squad/aws-agent, tag: "0.1.0" }
    port: 8001
    mountAgents: true
    expose: false
    serviceAccount:
      create: true
      annotations: {}
        # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/aigent-squad-aws
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 1, maxReplicas: 15 }
    networkPolicy:
      enabled: true
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: supervisor } }

  kubernetes:
    enabled: true
    image: { repository: aigent-squad/kubernetes-agent, tag: "0.1.0" }
    port: 8002
    mountAgents: true
    expose: false
    rbac: { readOnly: true }   # needs read-only K8s API access
    serviceAccount: { create: true, annotations: {} }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 1, maxReplicas: 10 }
    networkPolicy:
      enabled: true
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: supervisor } }

  finops:
    enabled: true
    image: { repository: aigent-squad/finops-agent, tag: "0.1.0" }
    port: 8003
    mountAgents: true
    expose: false
    serviceAccount:
      create: true
      annotations: {}
        # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/aigent-squad-finops
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 1, maxReplicas: 5 }
    networkPolicy:
      enabled: true
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: supervisor } }

  devops:
    enabled: true
    image: { repository: aigent-squad/devops-agent, tag: "0.1.0" }
    port: 8004
    mountAgents: true
    expose: false
    serviceAccount: { create: true, annotations: {} }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 1, maxReplicas: 5 }
    networkPolicy:
      enabled: true
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: supervisor } }

  observability:
    enabled: true
    image: { repository: aigent-squad/observability-agent, tag: "0.1.0" }
    port: 8005
    mountAgents: true
    expose: false
    serviceAccount: { create: true, annotations: {} }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 2, maxReplicas: 8 }
    networkPolicy:
      enabled: true
      allowFrom:
        - podSelector: { matchLabels: { app.kubernetes.io/component: supervisor } }

  mcp-server:
    enabled: true
    image: { repository: aigent-squad/mcp-server, tag: "0.1.0" }
    command: []                # mcp-server image has its own entrypoint
    port: 8006
    mountAgents: false
    expose: true               # facade for Kiro CLI
    env:
      # mcp-server calls the gateway's public /query (spec 31)
      SUPERVISOR_URL: "http://{{ .Release.Name }}-gateway:8000/query"
    serviceAccount: { create: true, annotations: {} }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { memory: 512Mi }
    scaling:
      autoscaling: { kind: keda, minReplicas: 1, maxReplicas: 5 }
    networkPolicy:
      enabled: true
      allowFrom: []            # gets ingress controller via expose: true

# NetworkPolicy on: specialists accept ingress only from the supervisor.
networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx

# Secrets from AWS Secrets Manager via External Secrets Operator.
externalSecrets:
  enabled: true
  secretStore: { name: aws-secrets-manager, kind: ClusterSecretStore }
  refreshInterval: 1h
  secrets:
    - name: aigent-squad-secrets
      data:
        - secretKey: INTERNAL_API_TOKEN
          remoteRef: { key: aigent-squad/internal-api-token }
        - secretKey: REDIS_PASSWORD
          remoteRef: { key: aigent-squad/redis-password }
        - secretKey: GITLAB_TOKEN
          remoteRef: { key: aigent-squad/gitlab-token }
        - secretKey: DOCS_PORTAL_TOKEN
          remoteRef: { key: aigent-squad/docs-portal-token }
        # spec 31 — gateway↔supervisor link token (distinct from INTERNAL_API_TOKEN)
        - secretKey: SUPERVISOR_INTERNAL_TOKEN
          remoteRef: { key: aigent-squad/supervisor-internal-token }

# External entrypoint — only the gateway + mcp-server are exposed (spec 31).
# The supervisor is backend-only; clients reach the squad through the gateway.
# This example uses Gateway API (Istio). Switch routing.type to "ingress"
# for an nginx/ALB Ingress, or "none" to disable external routing.
routing:
  type: gatewayapi          # none | ingress | gatewayapi
  host: aigent-squad.example.com
  paths:
    gateway: /
    mcp-server: /api/mcp
  tls:
    enabled: false          # GatewayAPI: TLS usually terminated at the Gateway
  gatewayapi:
    parentRef:
      name: istio
      namespace: istio-gateway
  # --- Ingress alternative (set routing.type: ingress to use) ---
  ingress:
    className: nginx
    annotations: {}

# Managed ElastiCache endpoint (set per environment).
redis:
  host: ""        # e.g. aigent-squad.xxxx.ng.0001.use1.cache.amazonaws.com
  ssl: true
  inCluster: { enabled: false }
