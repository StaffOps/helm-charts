{{- /*
Renders one workload per enabled service: an Argo Rollout when
services.<name>.rollout.enabled, otherwise a Deployment. KEDA owns the replica
count when scaling.keda.enabled, so replicas is omitted in that case.

The services map is user-extensible: every per-service field is read with a
safe default via `dig`, so adding a service requires only the keys you care about.
*/ -}}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $ctx := dict "root" $root "name" $name }}
{{- $fullname := include "aigent-squad.serviceFullname" $ctx }}
{{- $rolloutEnabled := dig "rollout" "enabled" false $svc }}
{{- $kedaEnabled := dig "scaling" "keda" "enabled" false $svc }}
{{- $mountAgents := dig "mountAgents" false $svc }}
{{- $replicas := dig "scaling" "replicas" 1 $svc }}
{{- $resources := dig "resources" (dict "requests" (dict "cpu" "100m" "memory" "256Mi") "limits" (dict "memory" "512Mi")) $svc }}
---
apiVersion: {{ if $rolloutEnabled }}argoproj.io/v1alpha1{{ else }}apps/v1{{ end }}
kind: {{ if $rolloutEnabled }}Rollout{{ else }}Deployment{{ end }}
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
spec:
  {{- if not $kedaEnabled }}
  replicas: {{ $replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aigent-squad.selectorLabels" $ctx | nindent 6 }}
  {{- if $rolloutEnabled }}
  strategy:
    {{- toYaml (dig "rollout" "strategy" dict $svc) | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "aigent-squad.serviceLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aigent-squad.serviceAccountName" (dict "root" $root "name" $name "svc" $svc) }}
      terminationGracePeriodSeconds: {{ $root.Values.global.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml $root.Values.global.podSecurityContext | nindent 8 }}
      {{- if and $mountAgents (eq $root.Values.agentsSource.type "git") }}
      initContainers:
        - name: git-sync
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              {{- if $root.Values.agentsSource.tokenSecret }}
              TOKEN=$(cat /git-token/token)
              REPO=$(echo "{{ $root.Values.agentsSource.repo }}" | sed "s|https://|https://x-access-token:${TOKEN}@|")
              {{- else }}
              REPO="{{ $root.Values.agentsSource.repo }}"
              {{- end }}
              git clone --depth=1 --branch={{ $root.Values.agentsSource.ref }} ${REPO} /tmp/repo && \
              cp -r /tmp/repo/{{ $root.Values.agentsSource.path }}/* /agents/
          volumeMounts:
            - name: agents-volume
              mountPath: /agents
            {{- if $root.Values.agentsSource.tokenSecret }}
            - name: git-token
              mountPath: /git-token
              readOnly: true
            {{- end }}
          securityContext:
            {{- toYaml $root.Values.global.securityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "aigent-squad.image" (dict "root" $root "svc" $svc) | quote }}
          imagePullPolicy: {{ $root.Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: {{ printf "aigent-squad-%s" $name | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ printf "aigent-squad-%s" $name | quote }}
            {{- if $mountAgents }}
            - name: AGENTS_DIR
              value: /app/agents
            {{- end }}
            {{- include "aigent-squad.commonEnv" $root | nindent 12 }}
            {{- range $k, $v := (dig "env" dict $svc) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if $root.Values.externalSecrets.enabled }}
          envFrom:
            {{- range $root.Values.externalSecrets.secrets }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- end }}
          {{- with $root.Values.global.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: http
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- with $root.Values.global.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: http
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ $root.Values.global.preStopSleepSeconds }}"]
          resources:
            {{- toYaml $resources | nindent 12 }}
          securityContext:
            {{- toYaml $root.Values.global.securityContext | nindent 12 }}
          volumeMounts:
            {{- if $mountAgents }}
            - name: agents-volume
              mountPath: /app/agents
              readOnly: {{ ne $root.Values.agentsSource.type "git" }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $mountAgents }}
        - name: agents-volume
          {{- if eq $root.Values.agentsSource.type "git" }}
          emptyDir: {}
          {{- else }}
          projected:
            sources:
              {{- range $root.Values.agents }}
              - configMap:
                  name: {{ printf "%s-agent-%s" (include "aigent-squad.fullname" $root) .name }}
                  items:
                    - key: agent.yaml
                      path: {{ .name }}/agent.yaml
                    - key: prompt.md
                      path: {{ .name }}/prompt.md
              {{- end }}
          {{- end }}
        {{- end }}
        {{- if and $mountAgents (eq $root.Values.agentsSource.type "git") $root.Values.agentsSource.tokenSecret }}
        - name: git-token
          secret:
            secretName: {{ $root.Values.agentsSource.tokenSecret }}
            defaultMode: 0400
        {{- end }}
{{- end }}
{{- end }}
