{{- if .Values.networkPolicy.enabled }}
# Controller: metrics ingress from the monitoring namespace (scraping).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "staffops-ad.controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "staffops-ad.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "staffops-ad.controller.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
      ports:
        - protocol: TCP
          port: {{ .Values.controller.service.port | default 8080 }}
---
{{- if .Values.redis.enabled }}
# Redis: ingress only from controller + worker.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "staffops-ad.redis.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "staffops-ad.controller.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "staffops-ad.worker.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
{{- end }}
---
# Worker gRPC: ingress only from controller (metrics open for scraping).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "staffops-ad.worker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "staffops-ad.worker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "staffops-ad.worker.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "staffops-ad.controller.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.worker.grpcPort | default 50052 }}
    # Metrics scrape from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
      ports:
        - protocol: TCP
          port: {{ .Values.worker.metricsPort | default 8081 }}
{{- if .Values.ml.enabled }}
---
# ML gRPC: ingress only from controller (metrics open for scraping).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "staffops-ad.ml.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "staffops-ad.ml.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "staffops-ad.ml.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "staffops-ad.controller.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ml.grpcPort | default 50051 }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
      ports:
        - protocol: TCP
          port: {{ .Values.ml.metricsPort | default 8082 }}
{{- end }}
{{- end }}
