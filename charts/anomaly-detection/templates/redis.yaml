{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  # Single replica only — this is a simple in-cluster Redis for dev and small
  # deployments. Production should use redis.enabled=false + external HA Redis
  # (ElastiCache, Redis Sentinel, etc.).
  replicas: 1
  strategy:
    type: Recreate   # avoid two replicas competing for the PVC during rollouts
  selector:
    matchLabels:
      {{- include "staffops-ad.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "staffops-ad.redis.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999       # redis user in the official image
        fsGroup: 999
      containers:
        - name: redis
          image: {{ include "staffops-ad.redis.image" . | quote }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- if eq (include "staffops-ad.redis.authEnabled" .) "true" }}
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "staffops-ad.redis.authSecretName" . }}
                  key: redis-password
          {{- else }}
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              {{- if eq (include "staffops-ad.redis.authEnabled" .) "true" }}
              command: ["sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
              {{- else }}
              command: ["redis-cli", "ping"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "staffops-ad.redis.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "staffops-ad.redis.selectorLabels" . | nindent 4 }}
{{- if .Values.redis.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | default "1Gi" }}
  {{- with .Values.redis.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
