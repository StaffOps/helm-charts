## AIgent-Squad Helm Values
## Config-driven multi-agent platform for AWS/K8s operations.
##
## One chart, two topologies (see `topology` below):
##   - inProcess  (default): a single supervisor process runs all agents,
##                 loaded from config (matches ADR-001 + spec 02).
##   - distributed:          supervisor + N specialist services + mcp-server,
##                 each its own Deployment/Service/SA (matches spec 05).
##
## Everything CRD-dependent (KEDA, Argo Rollouts, ExternalSecret, NetworkPolicy,
## Ingress) is opt-in and OFF by default so `helm lint`/`template` and a bare
## `ct install` stay green. Enable per environment via values-<env>.yaml.

# -----------------------------------------------------------------------------
# Topology
# -----------------------------------------------------------------------------
# inProcess | distributed
topology: inProcess

# -----------------------------------------------------------------------------
# Global settings — shared by every service (per-service values override these)
# -----------------------------------------------------------------------------
global:
  image:
    # Image = <registry>/<repository>:<tag>.
    #   repository: karlipegomes/aigent-squad (published by CI to Docker Hub).
    #   tag:        inherits Chart.appVersion (the pipeline bumps it) — don't
    #               hardcode a tag here.
    #   registry:   empty = Docker Hub as-is (the pipeline's target). Local dev
    #               overrides this to a Harbor project in the env overlay
    #               (e.g. harbor.bigdatacorp.com.br/labs) — Harbor is local-only.
    registry: ""
    pullPolicy: IfNotPresent

  # Non-sensitive config shared across services (12-factor III).
  # Secrets must come from ExternalSecret (see `externalSecrets` below), never here.
  env:
    AWS_REGION: "us-east-1"
    BEDROCK_MODEL_ID: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    ENVIRONMENT: "PRD"
    LOG_LEVEL: "info"

  # OpenTelemetry — App → Collector → Backend (observability-principles).
  otel:
    enabled: true
    endpoint: "http://otel-collector.monitoring:4317"

  # Extra labels applied to every workload/pod. Empty by default — the chart
  # imposes no org-specific labels. Add whatever your platform requires
  # (cost-allocation tags, environment, team, etc.) per deployment.
  labels: {}
    # Environment: PRD
    # team: my-team

  # Restricted pod/container security context (k8s-best-practices, cloud-security).
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Default probe paths (the code target is /healthz + /ready — see spec 07).
  # Override per service if an image still exposes only /health.
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3

  # Graceful shutdown (k8s-best-practices: drain before SIGTERM).
  terminationGracePeriodSeconds: 30
  preStopSleepSeconds: 5

# -----------------------------------------------------------------------------
# Backing services — external, NOT deployed by this chart (spec 05).
# DynamoDB / ElastiCache / Bedrock are managed; consumed via env + secret.
# -----------------------------------------------------------------------------
redis:
  # External ElastiCache endpoint. Password comes from ExternalSecret.
  host: ""          # e.g. aigent-squad.xxxx.ng.0001.use1.cache.amazonaws.com
  port: 6379
  ssl: true
  # Optional in-cluster Redis for DEV only (single pod, no HA). OFF by default.
  inCluster:
    enabled: false
    image: redis:7-alpine
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

dynamodb:
  sessionsTable: "agent-sessions"
  endpoint: ""      # leave empty for real DynamoDB; set for DynamoDB Local in DEV

# -----------------------------------------------------------------------------
# Agent definitions (config-driven). Consumed by the in-process supervisor via a
# projected volume, or shipped to the distributed agents the same way.
# -----------------------------------------------------------------------------
agentsSource:
  # configmap: inline configs from `agents[]` below (rendered as ConfigMaps)
  # git:       cloned from a repo at startup via an initContainer
  type: configmap
  repo: ""
  path: "agents"
  ref: "main"
  # For private repos: name of a Secret with key "token" (GitHub PAT/App token).
  tokenSecret: ""

agents:
  # Config MUST match the current AgentConfig schema (spec 22): name,
  # description, domain, capabilities, and datasources[] as OBJECTS (with a
  # `type`), not bare strings. These are minimal examples — override per
  # environment (or use agentsSource.type=git to load real configs from a repo).
  - name: aws
    config: |
      name: aws
      description: AWS infrastructure specialist (read-only)
      domain: cloud-infrastructure
      capabilities: [ec2_inventory, s3_management, rds_status, iam_audit]
      routing_keywords: [ec2, s3, rds, iam, vpc, lambda]
      datasources:
        - type: boto3
          services: [ec2, s3, rds, iam]
      read_only: true
    prompt: |
      You are an AWS infrastructure specialist agent.
      You help with EC2, RDS, S3, Lambda, VPC, and IAM — read-only.
  - name: kubernetes
    config: |
      name: kubernetes
      description: Kubernetes operations specialist (read-only)
      domain: container-orchestration
      capabilities: [pod_status, node_health, deployment_management]
      routing_keywords: [pod, node, deployment, namespace, k8s, cluster]
      datasources:
        - type: kubernetes
      read_only: true
    prompt: |
      You are a Kubernetes operations specialist agent.
      You help with cluster management, workloads, and troubleshooting.
  - name: finops
    config: |
      name: finops
      description: FinOps cost optimization specialist
      domain: cloud-costs
      capabilities: [cost_analysis, budget_tracking, savings_recommendations]
      routing_keywords: [cost, spend, budget, savings, billing]
      datasources:
        - type: boto3
          services: [ce]
      read_only: true
    prompt: |
      You are a FinOps specialist agent.
      You help with cost analysis, optimization, and allocation.
  - name: devops
    config: |
      name: devops
      description: DevOps CI/CD and automation specialist
      domain: development-operations
      capabilities: [pipeline_status, code_search, deployment_history]
      routing_keywords: [pipeline, deploy, ci, cd, gitlab, release]
      datasources:
        - type: http
          name: docs-portal
          url: "${DOCS_PORTAL_URL}"
      read_only: true
    prompt: |
      You are a DevOps specialist agent.
      You help with CI/CD pipelines, automation, and deployments.
  - name: observability
    config: |
      name: observability
      description: Observability and monitoring specialist
      domain: observability
      capabilities: [metrics_query, anomaly_detection, alert_status, log_query]
      routing_keywords: [metric, alert, latency, error rate, slo, log, trace]
      datasources:
        - type: http
          name: prometheus
          url: "${PROMETHEUS_URL}/api/v1/query?query=up"
      read_only: true
    prompt: |
      You are an Observability specialist agent.
      You help with metrics, logs, traces, and alerting.

# -----------------------------------------------------------------------------
# Services map. Each key renders a workload (Deployment or StatefulSet) +
# Service + ServiceAccount. Autoscaling: none, HPA, or KEDA.
# In `inProcess` topology only `supervisor` is used. In `distributed` the
# specialist + mcp-server entries are enabled (see values-distributed.yaml).
# -----------------------------------------------------------------------------
services:
  # Edge gateway (spec 31) — public front door. Edge auth, worker pool,
  # admission (rate/budget), protocol (OpenAI /v1 + /query). Forwards to the
  # supervisor's /internal/process. The ONLY tier exposed externally, and the
  # entrypoint for in-cluster callers too (Alertmanager, anomaly-detection,
  # Falco …) via networkPolicy.allowFrom below.
  gateway:
    enabled: true
    image:
      repository: karlipegomes/aigent-squad
    command: ["python", "-m", "src.gateway.main"]
    port: 8000
    mountAgents: false        # gateway holds no agent config
    expose: true              # the only externally-routed service
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    env:
      SUPERVISOR_URL: "http://{{ .Release.Name }}-supervisor:8001"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    workload:
      kind: Deployment
      strategy: {}
    scaling:
      replicas: 2
      autoscaling:
        kind: keda            # scales on RPS (define triggers per env)
        minReplicas: 2
        maxReplicas: 10
        pollingInterval: 30
        triggers: []
    networkPolicy:
      enabled: true
      # Gateway is the front door for external traffic AND in-cluster callers.
      # The ingress controller is added automatically (expose: true). Add other
      # in-cluster clients here — each entry is a NetworkPolicyPeer. Examples:
      allowFrom: []
      #   # Alertmanager (POST /alerts/incoming — spec 18)
      #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: monitoring } }
      #     podSelector: { matchLabels: { app.kubernetes.io/name: alertmanager } }
      #   # anomaly-detection controller
      #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: anomaly-detection } }
      #   # Falco
      #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: falco } }

  supervisor:
    enabled: true
    # repository is relative to global.image.registry unless it contains a "/".
    # tag omitted on purpose → inherits Chart.appVersion (reproducible, pinned).
    # Override per-release only by bumping appVersion in Chart.yaml.
    image:
      repository: karlipegomes/aigent-squad
    command: ["python", "-m", "src.supervisor.server"]
    port: 8001
    # In inProcess mode the supervisor runs every agent → mount the configs.
    mountAgents: true
    # Backend only (spec 31): reached via the gateway, never exposed externally.
    expose: false
    serviceAccount:
      create: true
      name: ""
      # IRSA — annotate with the role ARN (cloud-security): no creds mounted.
      annotations: {}
        # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/aigent-squad-supervisor
    env: {}
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    # Workload kind for this service.
    workload:
      kind: Deployment        # Deployment | StatefulSet
      # Deployment-only rolling update knobs (omit to use K8s defaults):
      strategy: {}
        # type: RollingUpdate
        # rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 }
      # StatefulSet-only:
      serviceName: ""          # headless service name (defaults to <fullname>-headless)
      podManagementPolicy: OrderedReady   # OrderedReady | Parallel
      volumeClaimTemplates: []            # standard PVC templates
    scaling:
      replicas: 2
      # Autoscaling: pick none, HPA, or KEDA.
      autoscaling:
        kind: none             # none | hpa | keda
        minReplicas: 2
        maxReplicas: 10
        # --- hpa (kind: hpa) ---
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: null   # set a number to add a memory metric
        # --- keda (kind: keda) — needs the KEDA CRDs ---
        pollingInterval: 30
        triggers: []           # KEDA triggers; defaults to a CPU trigger when empty
    networkPolicy:
      # Locked to gateway-only (spec 31 /internal/* trust boundary). Even with
      # global networkPolicy.enabled, the supervisor accepts ingress ONLY from
      # the gateway — in-cluster tools must go through the gateway (auth +
      # admission), never the supervisor directly. Do NOT add allowFrom here.
      enabled: true
      allowFrom:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway

# -----------------------------------------------------------------------------
# Routing — how exposed services (expose: true) are reached from outside.
# External routing — pick the type that matches your cluster:
#   none       → no external routing (port-forward / in-cluster only)
#   ingress    → networking.k8s.io/v1 Ingress (nginx, traefik, ALB, etc.)
#   gatewayapi → gateway.networking.k8s.io HTTPRoute (Istio, Cilium, etc.)
# -----------------------------------------------------------------------------
routing:
  type: none           # none | ingress | gatewayapi
  host: ""             # e.g. aigent-squad.example.com
  # Path prefix per exposed service (defaults to /<service> when unset).
  paths: {}
    # supervisor: /api/supervisor
    # mcp-server: /api/mcp
  tls:
    enabled: false
    secretName: ""     # Ingress: TLS secret. GatewayAPI: usually handled at the Gateway.

  # --- Ingress-specific (type: ingress) ---
  ingress:
    className: ""       # e.g. nginx, alb, traefik
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt
      # alb.ingress.kubernetes.io/scheme: internet-facing

  # --- Gateway API-specific (type: gatewayapi) ---
  gatewayapi:
    # Reference to an existing Gateway (this chart does NOT create the Gateway).
    parentRef:
      name: ""          # e.g. istio
      namespace: ""     # e.g. istio-gateway (empty → same namespace)
      sectionName: ""   # optional listener section name
    annotations: {}
    pathType: PathPrefix  # PathPrefix | Exact

# -----------------------------------------------------------------------------
# NetworkPolicy global toggle (per-service rules under services.<name>.networkPolicy)
# When enabled, specialist services only accept ingress from the supervisor.
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # label selector identifying the ingress controller namespace (for supervisor/mcp)
  ingressNamespaceSelector: {}
    # kubernetes.io/metadata.name: ingress-nginx

# -----------------------------------------------------------------------------
# ExternalSecret (External Secrets Operator → AWS Secrets Manager). OFF by default.
# Each item becomes one ExternalSecret producing one K8s Secret consumed via envFrom.
# -----------------------------------------------------------------------------
externalSecrets:
  enabled: false
  # SecretStore / ClusterSecretStore reference
  secretStore:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 1h
  # Each secret: target K8s Secret name + remote keys → env var names.
  secrets: []
    # - name: aigent-squad-secrets
    #   data:
    #     - secretKey: INTERNAL_API_TOKEN
    #       remoteRef: { key: aigent-squad/internal-api-token }
    #     - secretKey: REDIS_PASSWORD
    #       remoteRef: { key: aigent-squad/redis-password }
    #     - secretKey: GITLAB_TOKEN
    #       remoteRef: { key: aigent-squad/gitlab-token }
    #     # spec 31 — gateway↔supervisor link token, DISTINCT from INTERNAL_API_TOKEN.
    #     # Gateway sends it; supervisor validates it on /internal/process.
    #     - secretKey: SUPERVISOR_INTERNAL_TOKEN
    #       remoteRef: { key: aigent-squad/supervisor-internal-token }

# Name overrides
nameOverride: ""
fullnameOverride: ""
