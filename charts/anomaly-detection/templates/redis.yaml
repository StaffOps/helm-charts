{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  # Single replica — an in-cluster Redis for dev / small deployments. This is a
  # StatefulSet (not Deployment) so the identity and its PersistentVolumeClaim
  # share a lifecycle. Production HA should use redis.enabled=false + an external
  # HA Redis (ElastiCache, Redis Sentinel/Cluster).
  replicas: 1
  serviceName: {{ include "staffops-ad.redis.fullname" . }}
  selector:
    matchLabels:
      {{- include "staffops-ad.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "staffops-ad.redis.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999       # redis user in the official image
        fsGroup: 999
      containers:
        - name: redis
          image: {{ include "staffops-ad.redis.image" . | quote }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- if eq (include "staffops-ad.redis.authEnabled" .) "true" }}
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "staffops-ad.redis.authSecretName" . }}
                  key: redis-password
          {{- else }}
          command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              {{- if eq (include "staffops-ad.redis.authEnabled" .) "true" }}
              command: ["sh", "-c", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping"]
              {{- else }}
              command: ["redis-cli", "ping"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      {{- if not .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "staffops-ad.redis.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | default "1Gi" }}
        {{- with .Values.redis.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "staffops-ad.redis.fullname" . }}
  labels:
    {{- include "staffops-ad.redis.labels" . | nindent 4 }}
spec:
  # Headless service: stable DNS for the StatefulSet pod
  # (<fullname>-0.<fullname>.<ns>.svc). The service name also resolves to the
  # pod IP, which is what the controller/worker use via redis.addr.
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "staffops-ad.redis.selectorLabels" . | nindent 4 }}
{{- end }}
