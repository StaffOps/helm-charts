{{- if .Values.vmRule.enabled -}}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: {{ include "staffops-ad.fullname" . }}-recording
  namespace: {{ .Values.vmRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "staffops-ad.labels" . | nindent 4 }}
    {{- with .Values.vmRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: staffops-ad.recording
      interval: 1m
      rules:
        # Top noisy workloads (24h) — pre-aggregated for fast dashboard render.
        - record: staffops:detection_anomalies_24h:by_workload
          expr: |
            sum by (cluster, namespace, workload) (
              increase(staffops_ad_detection_anomalies_by_workload_total[24h])
            )
        - record: staffops:detection_anomalies_24h:by_workload_severity
          expr: |
            sum by (cluster, namespace, workload, severity) (
              increase(staffops_ad_detection_anomalies_by_workload_total[24h])
            )
        - record: staffops:detection_anomalies_1h:by_workload
          expr: |
            sum by (cluster, namespace, workload) (
              increase(staffops_ad_detection_anomalies_by_workload_total[1h])
            )
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: {{ include "staffops-ad.fullname" . }}-health
  namespace: {{ .Values.vmRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "staffops-ad.labels" . | nindent 4 }}
    {{- with .Values.vmRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: staffops-ad.health
      rules:
        - alert: StaffOpsADNoLeader
          expr: sum(staffops_ad_controller_is_leader) == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Anomaly detection has no active controller"
            description: "No controller has been leader for over 2 minutes."

        - alert: StaffOpsADStalled
          expr: rate(staffops_ad_controller_cycles_total[5m]) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Anomaly detection cycles stopped"
            description: "No detection cycles executed in the last 5 minutes."

        - alert: StaffOpsADWorkersDown
          expr: staffops_ad_controller_workers_available == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No workers reachable"
            description: "Controller cannot reach any worker via gRPC."

        - alert: StaffOpsADHighJobErrorRate
          expr: |
            (
              rate(staffops_ad_controller_jobs_failed_total[5m])
              /
              (rate(staffops_ad_controller_jobs_dispatched_total[5m]) > 0)
            ) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "More than 50% of jobs failing"
            description: "Detection job error rate is above 50%."

        - alert: StaffOpsADRedisErrors
          expr: rate(staffops_ad_worker_redis_errors_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Redis errors persistent"
            description: "Workers reporting Redis errors continuously."

        - alert: StaffOpsADCycleSlow
          expr: |
            histogram_quantile(0.99,
              rate(staffops_ad_controller_cycle_duration_seconds_bucket[5m])
            ) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Detection cycle p99 over 30s"
            description: "Cycle duration p99 exceeded 30s for 10 minutes."

        - alert: StaffOpsADMLErrorRate
          expr: |
            (
              rate(staffops_ad_controller_ml_calls_total{status="error"}[5m])
              /
              (rate(staffops_ad_controller_ml_calls_total[5m]) > 0)
            ) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ML service error rate > 10%"
            description: "ML multivariate detection calls failing."

    - name: staffops-ad.noisy-workloads
      rules:
        - alert: StaffOpsADWorkloadChronicallyNoisy
          expr: staffops:detection_anomalies_24h:by_workload > 100
          for: 1h
          labels:
            severity: info
          annotations:
            summary: "Workload {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.workload {{ "}}" }} is chronically noisy"
            description: |
              Workload produced more than 100 anomalies in the last 24h.
              Consider adding to suppression list or tuning thresholds.
{{- end }}
