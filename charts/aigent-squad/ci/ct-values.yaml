## Minimal values for chart-testing (ct lint / ct install on a bare kind cluster).
## No CRDs, no external deps — exercises the default inProcess topology.

topology: inProcess

global:
  image:
    registry: harbor.bdc.app.br
  otel:
    enabled: false
  env:
    AWS_REGION: "us-east-1"
    ENVIRONMENT: "DEV"

services:
  supervisor:
    enabled: true
    image:
      repository: aigent-squad/supervisor
      tag: "0.1.0"
    port: 8000
    mountAgents: true
    expose: false
    serviceAccount:
      create: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    scaling:
      replicas: 1
      keda:
        enabled: false
    rollout:
      enabled: false
    networkPolicy:
      enabled: false

agentsSource:
  type: configmap

agents:
  - name: test-agent
    config: |
      name: test-agent
      description: Test agent for chart-testing
      datasources: []
    prompt: |
      You are a test agent.

redis:
  host: ""
  inCluster:
    enabled: false

externalSecrets:
  enabled: false

ingress:
  enabled: false

networkPolicy:
  enabled: false
