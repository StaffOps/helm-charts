{{- /*
Read-only K8s RBAC (k8s-safety: get/list/watch only). Opt-in per service via
services.<name>.rbac.readOnly: true (e.g. the kubernetes agent). Bound to the
service's own ServiceAccount.
*/ -}}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (dig "rbac" "readOnly" false $svc) }}
{{- $ctx := dict "root" $root "name" $name }}
{{- $fullname := include "aigent-squad.serviceFullname" $ctx }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullname }}-readonly
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "autoscaling", "policy"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullname }}-readonly
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $fullname }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "aigent-squad.serviceAccountName" (dict "root" $root "name" $name "svc" $svc) }}
    namespace: {{ $root.Release.Namespace }}
{{- end }}
{{- end }}
