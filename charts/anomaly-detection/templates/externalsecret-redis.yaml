{{- if eq (include "staffops-ad.redis.authEnabled" .) "true" -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "staffops-ad.redis.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "staffops-ad.labels" . | nindent 4 }}
  annotations:
    # ESO must materialize the K8s Secret before Redis / controller / worker start.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.redis.auth.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.redis.auth.secretStore | default "aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ include "staffops-ad.redis.authSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: {{ required "redis.auth.awsSecretKey is required when redis.auth.enabled=true" .Values.redis.auth.awsSecretKey }}
{{- end }}
