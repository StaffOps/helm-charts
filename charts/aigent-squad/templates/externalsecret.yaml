{{- /*
ExternalSecret (External Secrets Operator → AWS Secrets Manager). Each entry
produces one K8s Secret consumed by the workloads via envFrom. Secrets never
live in values/ConfigMap (cloud-security, 12-factor). Opt-in.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
{{- $root := . -}}
{{- range .Values.externalSecrets.secrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  labels:
    {{- include "aigent-squad.labels" $root | nindent 4 }}
spec:
  refreshInterval: {{ $root.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $root.Values.externalSecrets.secretStore.name }}
    kind: {{ $root.Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- with .remoteRef.property }}
        property: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
