apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "aigent-squad.fullname" . }}-test-connection"
  labels:
    {{- include "aigent-squad.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ['curl', '--fail', '-s', 'http://{{ include "aigent-squad.fullname" . }}:{{ .Values.supervisor.port }}/health']
  restartPolicy: Never
