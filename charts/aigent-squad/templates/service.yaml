{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $ctx := dict "root" $root "name" $name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aigent-squad.serviceFullname" $ctx }}
  labels:
    {{- include "aigent-squad.serviceLabels" $ctx | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "aigent-squad.selectorLabels" $ctx | nindent 4 }}
{{- end }}
{{- end }}
